<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- 背景圆形 -->
  <circle cx="100" cy="100" r="95" fill="#6366F1" opacity="0.1"/>
  
  <!-- 大脑形状 -->
  <path d="M140,70 C150,80 155,95 155,110 C155,125 150,140 140,150 C130,160 115,165 100,165 C85,165 70,160 60,150 C50,140 45,125 45,110 C45,95 50,80 60,70 C70,60 85,55 100,55 C115,55 130,60 140,70 Z" fill="#6366F1"/>
  
  <!-- 大脑纹理 -->
  <path d="M100,65 C110,65 120,70 125,80 C130,90 130,100 125,110 C120,120 110,125 100,125 C90,125 80,120 75,110 C70,100 70,90 75,80 C80,70 90,65 100,65 Z" fill="#4F46E5" opacity="0.3"/>
  
  <!-- 预测图表 -->
  <g transform="translate(50, 130)">
    <!-- 坐标轴 -->
    <line x1="0" y1="40" x2="100" y2="40" stroke="#6366F1" stroke-width="2"/>
    <line x1="0" y1="40" x2="0" y2="0" stroke="#6366F1" stroke-width="2"/>
    
    <!-- 柱状图 -->
    <rect x="10" y="30" width="15" height="10" fill="#10B981"/>
    <rect x="30" y="20" width="15" height="20" fill="#3B82F6"/>
    <rect x="50" y="5" width="15" height="35" fill="#6366F1"/>
    <rect x="70" y="15" width="15" height="25" fill="#F59E0B"/>
    <rect x="90" y="25" width="15" height="15" fill="#EF4444"/>
  </g>
  
  <!-- 眼睛 -->
  <circle cx="85" cy="95" r="5" fill="white"/>
  <circle cx="115" cy="95" r="5" fill="white"/>
  
  <!-- 高光 -->
  <circle cx="83" cy="93" r="2" fill="#6366F1"/>
  <circle cx="113" cy="93" r="2" fill="#6366F1"/>
  
  <!-- 预测线条 -->
  <path d="M60,100 Q80,80 100,90 Q120,100 140,85" stroke="#10B981" stroke-width="2" fill="none"/>
</svg>